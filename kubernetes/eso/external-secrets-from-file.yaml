apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: miasanai-external-secrets
  namespace: miasanai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: miasanai-secrets
    creationPolicy: Owner
  
  # ANLEITUNG FÜR EIN EINZIGES FILE IM GCP SECRET MANAGER:
  # Wenn du alle Keys in einem einzigen Secret im GCP Secret Manager gespeichert hast,
  # nutze "dataFrom" statt "data". ESO extrahiert die Schlüssel-Wert-Paare automatisch.
  
  dataFrom:
    - extract:
        key: MIASANAI_ALL_KEYS # Der Name deines einzelnen Secrets im GCP Secret Manager
        # Falls das Secret im JSON-Format gespeichert ist, wird es hierdurch in einzelne K8s-Secret-Schlüssel zerlegt:
        # conversionStrategy: Default
        # decodingStrategy: Auto
